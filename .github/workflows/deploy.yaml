name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      # withastro/action（お任せパック）を使わず、手動で確実に指示を出します
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # 🌟重要: ここに `cache: 'npm'` を書きません。キャッシュを無視させます。

      - name: Install dependencies
        # 🌟重要: lockファイルを使わず、毎回必ず最新の必要なものを集めさせます
        run: npm install

      - name: Build Astro
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4